<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña - Badges App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="./styles/style.css">
    <script src="app.js" defer></script>
    <script src="reset-password.js" defer></script>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <div class="badge-icon" aria-hidden="true"></div>
            <h2>Nueva contraseña</h2>
        </div>
        <form class="input-container" id="reset-form" novalidate>
            <label for="password">Nueva contraseña</label>
            <input id="password" type="password" placeholder="Crea tu nueva contraseña" autocomplete="new-password" required>

            <p id="reset-error" class="error-message" role="alert" hidden></p>
            <button class="submit" type="submit">Restablecer contraseña</button>
        </form>
        <p class="form-footer">¿Recordaste tu contraseña? <a href="login.html">Inicia sesión</a></p>
    </div>
</body>
</html>
