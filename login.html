<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Badges App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="./styles/style.css">
    <script src="app.js" defer></script>
    <script src="login.js" defer></script>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <div class="badge-icon" aria-hidden="true"></div>
            <h2>Iniciar sesión</h2>
        </div>
        <form class="input-container" id="login-form" novalidate>
            <label for="email">Correo electrónico</label>
            <input id="email" type="email" placeholder="Introduce tu correo electrónico" autocomplete="email" required>

            <label for="password">Contraseña</label>
            <input id="password" type="password" placeholder="Introduce tu contraseña" autocomplete="current-password" required>

            <p class="forgot-password"><a href="#" id="forgot-link">¿Olvidaste tu contraseña?</a></p>

            <p id="login-error" class="error-message" role="alert" hidden></p>
            <button class="submit" type="submit">Entrar</button>
        </form>
        <p class="form-footer">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
    </div>
</body>
</html>
