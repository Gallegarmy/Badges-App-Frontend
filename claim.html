<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canjear medalla - Badges App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="./styles/profilestyle.css" />
    <script src="scripts/app.js" defer></script>
  </head>
  <body>
    <header class="page-header">
      <h1>Canjear Medalla</h1>
    </header>
    <main>
      <p id="status" class="status-message" role="status"></p>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const status = document.getElementById("status");

        const token = new URLSearchParams(location.search).get("token");
        const auth = getToken();

        function sleep(ms) {
          return new Promise((resolve) => setTimeout(resolve, ms));
        }

        if (!token) {
          status.textContent = "Missing QR token.";
          status.hidden = false;
          return;
        }

        if (!auth) {
          status.textContent = "Please log in before claiming a badge.";
          status.hidden = false;
          return;
        }

        try {
          const res = await fetch(API + "/qr/claim", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + auth,
            },
            body: JSON.stringify({ token }),
          });

          const data = await res.json();

          if (!res.ok) throw new Error(data.error || "Claim failed");

          status.textContent = "Badge claimed!";
          status.hidden = false;

          await sleep(3000);
          window.location.href = "profile.html";
        } catch (err) {
          status.textContent = err.message;
          status.hidden = false;
        }
      });
    </script>
  </body>
</html>
