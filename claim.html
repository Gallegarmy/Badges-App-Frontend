<script src="scripts/app.js" defer></script>

<h2 id="status">Claim Badge</h2>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const status = document.getElementById("status");

  const token = new URLSearchParams(location.search).get("token");
  const auth = getToken();

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  if (!token) {
    status.textContent = "Missing QR token.";
    return;
  }

  if (!auth) {
    status.textContent = "Please log in before claiming a badge.";
    await sleep(1000);
    window.location.href = `login?badge-token=${token}`;
  }

  try {
    const res = await fetch(API + "/qr/claim", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + auth
      },
      body: JSON.stringify({ token })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error || "Claim failed");

    status.textContent = "Badge claimed!";

    await sleep(1000);
    window.location.href = "profile.html";

  } catch (err) {
    status.textContent = err.message;
  }

});
</script>
